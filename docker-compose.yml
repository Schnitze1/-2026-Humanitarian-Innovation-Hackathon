version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: aiga_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: aiga_db
    ports:
      - "5432:5432"
    volumes:
      - aiga_pgdata:/var/lib/postgresql/data

volumes:
  aiga_pgdata:
